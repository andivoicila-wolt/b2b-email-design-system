<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Current vs Revised - Wolt Email Mapping</title>
  <style>
    @import url("https://use.typekit.net/nma8sen.css");

    :root {
      --bg: #f8f8f8;
      --text: #021738;
      --muted: #4a5568;
      --surface: #ffffff;
      --surface-2: #f2f6fc;
      --border: #d4e1f1;
      --accent: #00c2e8;
      --shadow: 0 8px 20px rgba(2, 23, 56, 0.08);
    }

    [data-theme="dark"] {
      --bg: #021738;
      --text: #e6edf8;
      --muted: #b7c5d9;
      --surface: #0c2142;
      --surface-2: #12325d;
      --border: #2f4f7f;
      --accent: #53d5f1;
      --shadow: 0 12px 26px rgba(0, 0, 0, 0.4);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      padding: 24px;
      background: var(--bg);
      color: var(--text);
      font-family: 'omnes-pro', 'Avenir Next', 'Segoe UI', 'Helvetica Neue', Helvetica, Arial, sans-serif;
      font-feature-settings: "ss01" 1, "ss05" 1, "ss07" 1;
    }

    .wrap {
      max-width: 1260px;
      margin: 0 auto;
    }

    .top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 14px;
    }

    h1 { margin: 0; font-size: 28px; }
    .sub { margin: 8px 0 0 0; color: var(--muted); font-size: 14px; }

    .actions { display: flex; gap: 8px; }
    .btn {
      border: 1px solid var(--border);
      background: transparent;
      color: var(--text);
      border-radius: 999px;
      padding: 8px 12px;
      font-size: 12px;
      cursor: pointer;
      text-decoration: none;
    }

    .row {
      border: 1px solid var(--border);
      border-radius: 12px;
      background: var(--surface);
      box-shadow: var(--shadow);
      margin-bottom: 12px;
      overflow: hidden;
    }

    .row-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      padding: 10px 12px;
      background: var(--surface-2);
      border-bottom: 1px solid var(--border);
    }

    .name { font-size: 14px; font-weight: 700; }

    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr 320px;
      gap: 0;
      min-height: 420px;
    }

    .pane {
      padding: 10px;
      border-right: 1px solid var(--border);
    }

    .pane:last-child { border-right: none; }

    .pane-title {
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.6px;
      color: var(--muted);
      margin-bottom: 8px;
    }

    .current {
      width: 100%;
      background: #ffffff;
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 8px;
      text-align: center;
    }

    .current img {
      max-width: 100%;
      height: auto;
      display: inline-block;
    }

    .revised {
      border: 1px solid var(--border);
      border-radius: 10px;
      overflow: hidden;
      height: 100%;
      min-height: 350px;
      background: var(--surface-2);
    }

    .revised iframe {
      width: 100%;
      height: 100%;
      border: 0;
      display: block;
      background: #f8f8f8;
    }

    .checklist {
      border: 1px solid var(--border);
      border-radius: 10px;
      background: var(--surface-2);
      padding: 10px;
      min-height: 350px;
    }

    .check-item {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 13px;
      margin-bottom: 8px;
    }

    .check-item input {
      width: 16px;
      height: 16px;
      accent-color: var(--accent);
      flex: 0 0 auto;
    }

    .notes-label {
      margin: 10px 0 6px;
      font-size: 12px;
      font-weight: 700;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .notes {
      width: 100%;
      min-height: 110px;
      padding: 8px;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: var(--surface);
      color: var(--text);
      font-family: inherit;
      font-size: 13px;
      resize: vertical;
    }

    .check-actions {
      margin-top: 8px;
      display: flex;
      justify-content: flex-end;
      gap: 8px;
    }

    @media (max-width: 980px) {
      .grid { grid-template-columns: 1fr; }
      .pane { border-right: none; border-bottom: 1px solid var(--border); }
      .pane:last-child { border-bottom: none; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="top">
      <div>
        <h1>Current vs Revised Mapping</h1>
        <p class="sub">Side-by-side check to validate component coverage and detect missing modules.</p>
      </div>
      <div class="actions">
        <a href="index.html" class="btn">Back</a>
        <button id="export-notes" class="btn" type="button">Export notes</button>
        <button id="reset-all" class="btn" type="button">Reset all audits</button>
        <button id="theme-toggle" class="btn" type="button">Switch to dark mode</button>
      </div>
    </div>

    <div id="rows"></div>
  </div>

  <script>
    (function () {
      var STORAGE_KEY = 'wolt-email-preview-theme';
      var AUDIT_KEY = 'wolt-email-compare-audit-v1';
      var toggle = document.getElementById('theme-toggle');
      var exportBtn = document.getElementById('export-notes');
      var resetAllBtn = document.getElementById('reset-all');
      var rows = document.getElementById('rows');
      var checks = [
        ['moduleMissing', 'Missing module'],
        ['copyMismatch', 'Copy mismatch'],
        ['layoutMismatch', 'Layout mismatch'],
        ['visualMismatch', 'Visual hierarchy mismatch'],
        ['ctaMismatch', 'CTA mismatch']
      ];

      var mappings = [
        ['Survey - Feedback Ask', 'assets/current-mapped/survey-feedback.png', 'survey-feedback.html'],
        ['Product - Menu Upgrade', 'assets/current-mapped/product-menu-upgrade.png', 'product-menu-upgrade.html'],
        ['Product - Performance Recovery', 'assets/current-mapped/product-performance-recovery.png', 'product-performance-recovery.html'],
        ['Growth - Wolt Capital', 'assets/current-mapped/growth-wolt-capital.png', 'growth-wolt-capital.html'],
        ['Growth - Wolt Drive Offer', 'assets/current-mapped/growth-drive-offer.png', 'growth-drive-offer.html'],
        ['Growth - Ads Opportunity', 'assets/current-mapped/growth-ads-opportunity.png', 'growth-ads-opportunity.html'],
        ['Newsletter - Holiday Checklist', 'assets/current-mapped/newsletter-holiday-checklist.png', 'newsletter-holiday-checklist.html'],
        ['Newsletter - Valentine Campaign', 'assets/current-mapped/newsletter-valentine-campaign.png', 'newsletter-valentine-campaign.html'],
        ['Operational - Glitch Notice', 'assets/current-mapped/operational-glitch-notice.png', 'operational-glitch-notice.html'],
        ['Operational - 30 Day Summary', 'assets/current-mapped/operational-30day-summary.png', 'operational-30day-summary.html']
      ];

      function getTheme() {
        var saved = localStorage.getItem(STORAGE_KEY);
        return saved === 'dark' ? 'dark' : 'light';
      }

      function setTheme(theme) {
        document.documentElement.setAttribute('data-theme', theme);
        localStorage.setItem(STORAGE_KEY, theme);
        toggle.textContent = theme === 'dark' ? 'Switch to light mode' : 'Switch to dark mode';
      }

      function loadAudit() {
        try {
          var raw = localStorage.getItem(AUDIT_KEY);
          return raw ? JSON.parse(raw) : {};
        } catch (e) {
          return {};
        }
      }

      function saveAudit(data) {
        localStorage.setItem(AUDIT_KEY, JSON.stringify(data));
      }

      function ensureRow(audit, id) {
        if (!audit[id]) {
          audit[id] = {
            moduleMissing: false,
            copyMismatch: false,
            layoutMismatch: false,
            visualMismatch: false,
            ctaMismatch: false,
            notes: ''
          };
        }
        return audit[id];
      }

      function escapeHtml(text) {
        return String(text)
          .replace(/&/g, '&amp;')
          .replace(/</g, '&lt;')
          .replace(/>/g, '&gt;')
          .replace(/"/g, '&quot;')
          .replace(/'/g, '&#39;');
      }

      function bindAuditHandlers() {
        var audit = loadAudit();
        var inputs = rows.querySelectorAll('input[data-audit-id], textarea[data-audit-id], button[data-reset-id]');
        inputs.forEach(function (el) {
          if (el.tagName === 'BUTTON') {
            el.addEventListener('click', function () {
              var id = el.getAttribute('data-reset-id');
              delete audit[id];
              saveAudit(audit);
              render();
            });
            return;
          }

          var handler = function () {
            var id = el.getAttribute('data-audit-id');
            var key = el.getAttribute('data-audit-key');
            var row = ensureRow(audit, id);
            row[key] = el.type === 'checkbox' ? el.checked : el.value;
            saveAudit(audit);
          };
          el.addEventListener('change', handler);
          if (el.tagName === 'TEXTAREA') {
            el.addEventListener('input', handler);
          }
        });
      }

      function exportAudit() {
        var audit = loadAudit();
        var lines = ['# Wolt Email Compare Audit', ''];
        mappings.forEach(function (m) {
          var id = m[2];
          var row = audit[id];
          if (!row) return;
          var hasIssue = checks.some(function (c) { return row[c[0]]; }) || (row.notes && row.notes.trim());
          if (!hasIssue) return;
          lines.push('## ' + m[0] + ' (' + id + ')');
          checks.forEach(function (c) {
            if (row[c[0]]) lines.push('- [x] ' + c[1]);
          });
          if (row.notes && row.notes.trim()) {
            lines.push('- Notes: ' + row.notes.trim().replace(/\n/g, ' / '));
          }
          lines.push('');
        });

        var out = lines.join('\n');
        if (navigator.clipboard && navigator.clipboard.writeText) {
          navigator.clipboard.writeText(out).then(function () {
            exportBtn.textContent = 'Exported to clipboard';
            setTimeout(function () { exportBtn.textContent = 'Export notes'; }, 1200);
          });
          return;
        }
        window.prompt('Copy audit notes:', out);
      }

      function render() {
        var audit = loadAudit();
        rows.innerHTML = mappings.map(function (m) {
          var id = m[2];
          var rowAudit = ensureRow(audit, id);
          var checksHtml = checks.map(function (c) {
            var checked = rowAudit[c[0]] ? ' checked' : '';
            return '<label class="check-item"><input type="checkbox" data-audit-id="' + id + '" data-audit-key="' + c[0] + '"' + checked + '><span>' + c[1] + '</span></label>';
          }).join('');
          return [
            '<section class="row">',
            '  <div class="row-head">',
            '    <div class="name">' + m[0] + '</div>',
            '    <a class="btn" href="preview.html?template=' + encodeURIComponent(m[2]) + '">Open in full preview</a>',
            '  </div>',
            '  <div class="grid">',
            '    <div class="pane">',
            '      <div class="pane-title">Current Version</div>',
            '      <div class="current"><img src="' + m[1] + '" alt="Current version"></div>',
            '    </div>',
            '    <div class="pane">',
            '      <div class="pane-title">Revised Modular Version</div>',
            '      <div class="revised"><iframe title="' + m[0] + ' revised" src="' + m[2] + '"></iframe></div>',
            '    </div>',
            '    <div class="pane">',
            '      <div class="pane-title">Audit Checklist</div>',
            '      <div class="checklist">',
                     checksHtml,
            '        <div class="notes-label">Notes</div>',
            '        <textarea class="notes" data-audit-id="' + id + '" data-audit-key="notes" placeholder="What is still missing or inconsistent?">' + escapeHtml(rowAudit.notes || '') + '</textarea>',
            '        <div class="check-actions"><button class="btn" type="button" data-reset-id="' + id + '">Reset row</button></div>',
            '      </div>',
            '    </div>',
            '  </div>',
            '</section>'
          ].join('');
        }).join('');
        bindAuditHandlers();
      }

      toggle.addEventListener('click', function () {
        setTheme(getTheme() === 'dark' ? 'light' : 'dark');
      });
      exportBtn.addEventListener('click', exportAudit);
      resetAllBtn.addEventListener('click', function () {
        localStorage.removeItem(AUDIT_KEY);
        render();
      });

      setTheme(getTheme());
      render();
    })();
  </script>
</body>
</html>
